version: "1.0"

# Contrato de entrada al framework
input:
  project_name:
    type: string
    required: true
    description: Nombre corto del proyecto (usado en el nombre del fichero de resultado)
  description:
    type: string
    required: true
    description: >
      Descripción del proyecto a investigar. Puede ser breve (problema + solución + público)
      o un texto extenso (documento de propuesta completo). Si es muy largo, el agente de
      análisis extrae un resumen estructurado antes de lanzar el research.
  document_path:
    type: string
    required: false
    description: >
      Nombre del fichero de entrada situado en research/data/in/ (ej. "propuesta.pdf").
      El orquestador construye la ruta completa automáticamente. Alternativa o complemento
      a description. Los ficheros en data/in/ son gitignoreados y nunca se suben al repo.
# Contrato de salida del agente de análisis previo
analysis_output:
  agent_id:
    type: string
    const: "analysis"
  status:
    type: string
    enum: [completed, insufficient_info]
    description: >
      "completed" si la descripción tiene suficiente sustancia para extraer estructura.
      "insufficient_info" si la propuesta es tan vaga que no permite formular hipótesis — condición de salida.
  scientific_basis:
    type: string
    description: Fundamento científico/tecnológico subyacente de la propuesta
  differentiators:
    type: array
    description: Aspectos diferenciales identificados con hipótesis verificables
    items:
      aspect: string
      hypothesis: string
  use_cases:
    type: array
    description: Casos de uso identificados con su usuario objetivo
    items:
      use_case: string
      target_user: string
  proposal_summary:
    type: string
    description: >
      Resumen estructurado de la propuesta (400-600 palabras) extraído del input original,
      sea este breve o un documento extenso. Los agentes de research usan este campo
      como referencia principal en lugar del texto completo.
  missing_elements:
    type: array
    description: Elementos ausentes en la propuesta (solo si status=insufficient_info) — para que el evaluador pueda comunicárselos al investigador
    items:
      type: string

# Contrato de salida de cada agente de research
agent_output:
  agent_id:
    type: string
    description: Identificador del agente (ej. "consensus", "market-projects")
  status:
    type: string
    enum: [completed, skipped, error]
  summary:
    type: string
    description: Resumen en 2-4 frases de los hallazgos principales
  evidence:
    type: array
    description: Lista de evidencias concretas que soportan el summary
    items:
      source: string
      finding: string
  confidence:
    type: string
    enum: [low, medium, high]
    description: Nivel de confianza en los hallazgos
  recommendation:
    type: string
    enum: [continue, stop]
    description: >
      "stop" si la evidencia es suficientemente concluyente para no necesitar
      más módulos de research. "continue" si se recomienda ejecutar el siguiente.
  findings:
    type: object
    description: Hallazgos detallados específicos del agente (estructura libre por agente)

# Contrato de entrada del agente de síntesis
synthesis_input:
  project_name: string
  description: string
  agent_results:
    type: array
    description: Array con el output de cada agente ejecutado (en orden de ejecución)

# Contrato de salida del agente de síntesis
synthesis_output:
  rating:
    type: string
    enum: [strong_go, conditional_go, no_go]
    description: >
      Valoración agregada de la propuesta.
      "strong_go": evidencia consistente de viabilidad en múltiples dimensiones.
      "conditional_go": viable con condiciones críticas pendientes de validar.
      "no_go": evidencia suficientemente sólida en contra del fundamento, mercado o diferenciación.
  overall_assessment:
    type: string
    description: >
      Evaluación narrativa de 3-5 frases que integra todos los hallazgos en una lectura
      cohesionada — no un resumen por agente, sino una interpretación unificada.
  agent_summaries:
    type: array
    description: Resumen de la aportación de cada agente que completó su ejecución
    items:
      agent_id: string
      key_finding: string      # hallazgo principal en 1-2 frases
      stance: string           # supportive | neutral | cautionary
  decision:
    type: string
    enum: [ask_more_info, propose_experiment]
    description: >
      "ask_more_info" si hay lagunas críticas que el evaluador debe aclarar antes de experimentar.
      "propose_experiment" si la evidencia es suficiente para definir al menos un experimento de validación.
  rationale:
    type: string
    description: Razonamiento que justifica la decisión
  synthesis_notes:
    type: string
    description: Convergencias, divergencias y puntos ciegos entre los módulos ejecutados
  experiments:
    type: array
    description: >
      Lista de experimentos priorizados. Presente solo si decision == "propose_experiment".
      Orden: (1) reducción de incertidumbre/riesgo; (2) coste como criterio de desempate.
    items:
      priority_rank: integer
      name: string
      description: string
      resolves: string            # qué incertidumbre o riesgo específico elimina
      metrics: string             # cómo se mide el éxito del experimento
      learning_criticality: string  # por qué este aprendizaje es crítico ahora
      cost: string                # rough order of magnitude de recursos y tiempo
  global_experiment_recommendation:
    type: string
    description: >
      Recomendación narrativa sobre cómo proceder con los experimentos en conjunto:
      orden, paralelismo posible, dependencias. Presente solo si decision == "propose_experiment".
  next_steps:
    type: array
    description: Preguntas concretas a aclarar. Presente solo si decision == "ask_more_info".
    items:
      type: string

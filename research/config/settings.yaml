version: "1.0"

# Rutas relativas a la raíz del framework (research/)
paths:
  market_data_dir: data/market
  projects_output_dir: data/projects
  wip_dir: wip
  state_dir: state

# Modelo por defecto para los agentes (puede sobreescribirse en el frontmatter de cada agente)
default_model: claude-sonnet-4-6

# Límite de ficheros de mercado que el agente market-projects procesará por ejecución
market_projects_max_files: 20
